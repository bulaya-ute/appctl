name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    name: Compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod tidy

      - name: Build
        env:
          CGO_ENABLED: 0
        run: go build ./cmd/appctl

      - name: Vet
        run: go vet ./...
